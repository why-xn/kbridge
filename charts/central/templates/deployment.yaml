apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "central.fullname" . }}
  labels:
    {{- include "central.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "central.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "central.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: central
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args: ["--config", "/etc/kbridge/central.yaml"]
          {{- if .Values.auth.existingSecret }}
          env:
            - name: KBRIDGE_JWT_SECRET_FILE
              value: /run/secrets/kbridge/jwt_secret
            - name: KBRIDGE_TOKEN_PEPPER_FILE
              value: /run/secrets/kbridge/token_pepper
            - name: KBRIDGE_ADMIN_PASSWORD_FILE
              value: /run/secrets/kbridge/admin_password
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: {{ if .Values.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/kbridge/central.yaml
              subPath: central.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.auth.existingSecret }}
            - name: kbridge-secrets
              mountPath: /run/secrets/kbridge
              readOnly: true
            {{- end }}
            {{- if .Values.rbac.policy }}
            - name: rbac
              mountPath: /etc/kbridge/rbac
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/kbridge/tls
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ dir .Values.persistence.dbPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "central.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.auth.existingSecret }}
        - name: kbridge-secrets
          secret:
            secretName: {{ .Values.auth.existingSecret }}
        {{- end }}
        {{- if .Values.rbac.policy }}
        - name: rbac
          configMap:
            name: {{ include "central.fullname" . }}-rbac
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "central.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
