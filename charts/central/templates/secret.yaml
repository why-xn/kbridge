apiVersion: v1
kind: Secret
metadata:
  name: {{ include "central.fullname" . }}-config
  labels:
    {{- include "central.labels" . | nindent 4 }}
type: Opaque
stringData:
  central.yaml: |
    server:
      http_port: {{ .Values.service.httpPort }}
      grpc_port: {{ .Values.service.grpcPort }}
    database:
      driver: sqlite
      path: {{ .Values.persistence.dbPath }}
    auth:
      jwt_secret: {{ .Values.auth.jwtSecret | quote }}
      token_pepper: {{ .Values.auth.tokenPepper | quote }}
      access_token_expiry: {{ .Values.auth.accessTokenExpiry }}
      refresh_token_expiry: {{ .Values.auth.refreshTokenExpiry }}
      admin_email: {{ .Values.auth.adminEmail | quote }}
      admin_password: {{ .Values.auth.adminPassword | quote }}
      admin_name: {{ .Values.auth.adminName | quote }}
    streams:
      max_concurrent: {{ .Values.streams.maxConcurrent }}
    audit:
      retention_days: {{ .Values.audit.retentionDays }}
      cleanup_interval: {{ .Values.audit.cleanupInterval }}
    {{- if or .Values.bootstrap.agentToken .Values.bootstrap.agentCluster }}
    bootstrap:
      agent_token: {{ .Values.bootstrap.agentToken | quote }}
      agent_cluster: {{ .Values.bootstrap.agentCluster | quote }}
    {{- end }}
    {{- if .Values.rbac.policy }}
    rbac:
      policy_file: /etc/kbridge/rbac/rbac.yaml
    {{- end }}
    {{- if .Values.tls.enabled }}
    tls:
      enabled: true
      cert_file: /etc/kbridge/tls/tls.crt
      key_file: /etc/kbridge/tls/tls.key
    {{- end }}
