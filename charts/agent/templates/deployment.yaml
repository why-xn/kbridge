apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "agent.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/kbridge/agent.yaml"]
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if .Values.central.existingSecret }}
            - name: KBRIDGE_AGENT_TOKEN_FILE
              value: /etc/kbridge-token/token
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/kbridge
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.central.existingSecret }}
            - name: agent-token
              mountPath: /etc/kbridge-token
              readOnly: true
            {{- end }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "find /tmp/kbridge-agent-healthy -mmin -1 | grep -q ."]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "find /tmp/kbridge-agent-healthy -mmin -1 | grep -q ."]
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "agent.fullname" . }}-config
        - name: tmp
          emptyDir: {}
        {{- if .Values.central.existingSecret }}
        - name: agent-token
          secret:
            secretName: {{ .Values.central.existingSecret }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
