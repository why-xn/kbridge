apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent.fullname" . }}-config
  labels:
    {{- include "agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  agent.yaml: |
    central:
      url: {{ .Values.central.url | quote }}
      token: {{ .Values.central.token | quote }}
      {{- if .Values.central.tls.enabled }}
      tls:
        enabled: true
        insecure: {{ .Values.central.tls.insecure }}
        {{- if .Values.central.tls.caCert }}
        ca_file: /etc/kbridge/ca.crt
        {{- end }}
      {{- end }}
    cluster:
      name: {{ .Values.cluster.name | quote }}
      {{- if .Values.cluster.kubernetesVersion }}
      kubernetes_version: {{ .Values.cluster.kubernetesVersion | quote }}
      {{- end }}
      {{- if .Values.cluster.nodeCount }}
      node_count: {{ .Values.cluster.nodeCount }}
      {{- end }}
      {{- if .Values.cluster.region }}
      region: {{ .Values.cluster.region | quote }}
      {{- end }}
      {{- if .Values.cluster.provider }}
      provider: {{ .Values.cluster.provider | quote }}
      {{- end }}
  {{- if and .Values.central.tls.enabled .Values.central.tls.caCert }}
  ca.crt: |
    {{- .Values.central.tls.caCert | nindent 4 }}
  {{- end }}
