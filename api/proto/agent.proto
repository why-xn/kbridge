syntax = "proto3";

package kbridge.agent.v1;

option go_package = "github.com/why-xn/kbridge/api/proto/agentpb";

// AgentService defines the gRPC service for agent-central communication.
// Central service implements this service, agents connect as clients.
service AgentService {
  // Register is called by the agent when it first connects to central.
  // It provides cluster metadata and authenticates with an agent token.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat is called periodically by the agent to maintain connection
  // and report its current status.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // OpenStream is opened once by the agent after Register. Central pushes
  // streaming command/control messages down it; the agent streams output back
  // up. Sessions are multiplexed by session_id.
  rpc OpenStream(stream AgentStreamMessage) returns (stream CentralStreamMessage);

  // GetPendingCommands is called by the agent to poll for commands to execute.
  // Returns any pending commands for this agent.
  rpc GetPendingCommands(GetPendingCommandsRequest) returns (GetPendingCommandsResponse);

  // SubmitCommandResult is called by the agent after executing a command.
  // Submits the command output and exit code back to central.
  rpc SubmitCommandResult(SubmitCommandResultRequest) returns (SubmitCommandResultResponse);
}

// RegisterRequest is sent by the agent to register with central service.
message RegisterRequest {
  // agent_token is the pre-shared token used to authenticate the agent.
  string agent_token = 1;

  // cluster_name is the unique name identifying this cluster.
  string cluster_name = 2;

  reserved 3;
}

// RegisterResponse is returned after an agent registration attempt.
message RegisterResponse {
  // success indicates whether registration was successful.
  bool success = 1;

  // agent_id is a unique identifier assigned to this agent by central.
  // Used in subsequent Heartbeat and ExecuteCommand calls.
  string agent_id = 2;

  // error_message contains details if registration failed.
  string error_message = 3;
}

// HeartbeatRequest is sent periodically by the agent to maintain connection.
message HeartbeatRequest {
  // agent_id is the identifier assigned during registration.
  string agent_id = 1;

  // status indicates the current health status of the agent.
  AgentStatus status = 2;
}

// AgentStatus represents the health status of an agent.
enum AgentStatus {
  // AGENT_STATUS_UNKNOWN indicates status is not known.
  AGENT_STATUS_UNKNOWN = 0;

  // AGENT_STATUS_HEALTHY indicates the agent is functioning normally.
  AGENT_STATUS_HEALTHY = 1;

  // AGENT_STATUS_DEGRADED indicates the agent is running but experiencing issues.
  AGENT_STATUS_DEGRADED = 2;
}

// HeartbeatResponse is returned in response to a heartbeat.
message HeartbeatResponse {
  // acknowledged indicates the heartbeat was received.
  bool acknowledged = 1;

  // next_heartbeat_seconds indicates how long to wait before the next heartbeat.
  int64 next_heartbeat_seconds = 2;
}

// CommandRequest represents a kubectl command to execute on the agent.
message CommandRequest {
  // request_id is a unique identifier for this command execution.
  string request_id = 1;

  // agent_id identifies which agent should execute this command.
  string agent_id = 2;

  // command is the kubectl command arguments (e.g., ["get", "pods", "-o", "wide"]).
  repeated string command = 3;

  // namespace is the Kubernetes namespace for the command (optional).
  string namespace = 4;

  // timeout_seconds is the maximum time to wait for command completion.
  int32 timeout_seconds = 5;

  // stdin is optional input to be piped to the command's standard input.
  // Used for commands like "kubectl apply -f -" that read from stdin.
  bytes stdin = 6;
}

// CommandResponse contains output from a command execution.
// Multiple responses may be streamed as output is generated.
message CommandResponse {
  // request_id matches the request that generated this response.
  string request_id = 1;

  // type indicates whether this is stdout or stderr output.
  OutputType type = 2;

  // data contains the raw output bytes.
  bytes data = 3;

  // complete indicates this is the final response for this command.
  bool complete = 4;

  // exit_code is the command's exit code (only set when complete=true).
  int32 exit_code = 5;

  // error_message contains error details if the command failed to execute.
  string error_message = 6;
}

// OutputType indicates the type of command output.
enum OutputType {
  // OUTPUT_TYPE_UNKNOWN indicates output type is not known.
  OUTPUT_TYPE_UNKNOWN = 0;

  // OUTPUT_TYPE_STDOUT indicates standard output.
  OUTPUT_TYPE_STDOUT = 1;

  // OUTPUT_TYPE_STDERR indicates standard error.
  OUTPUT_TYPE_STDERR = 2;
}

// GetPendingCommandsRequest is sent by the agent to poll for commands.
message GetPendingCommandsRequest {
  // agent_id is the identifier assigned during registration.
  string agent_id = 1;
}

// GetPendingCommandsResponse contains any pending commands for the agent.
message GetPendingCommandsResponse {
  // commands contains the list of pending commands to execute.
  repeated CommandRequest commands = 1;
}

// SubmitCommandResultRequest is sent by the agent after executing a command.
message SubmitCommandResultRequest {
  // request_id matches the command that was executed.
  string request_id = 1;

  // stdout contains the standard output from the command.
  bytes stdout = 2;

  // stderr contains the standard error from the command.
  bytes stderr = 3;

  // exit_code is the command's exit code.
  int32 exit_code = 4;

  // error_message contains error details if the command failed to execute.
  string error_message = 5;
}

// SubmitCommandResultResponse confirms the result was received.
message SubmitCommandResultResponse {
  // success indicates the result was accepted.
  bool success = 1;
}

message CentralStreamMessage {
  oneof msg {
    StartStream      start    = 1;
    CancelStream     cancel   = 2;
    StdinData        stdin    = 3;
    Resize           resize   = 4;
    PortForwardStart pf_start = 5;
    PfOpen           pf_open  = 6;
    PfData           pf_data  = 7;
    PfClose          pf_close = 8;
  }
}
message StartStream  {
  string session_id = 1;
  repeated string command = 2;
  string namespace = 3;
  bool   tty = 4;
  uint32 rows = 5;
  uint32 cols = 6;
}
message CancelStream { string session_id = 1; }
message StdinData    { string session_id = 1; bytes  data = 2; }
message Resize       { string session_id = 1; uint32 rows = 2; uint32 cols = 3; }

message AgentStreamMessage {
  oneof msg {
    StreamRegister register         = 1;
    StreamOutput   output           = 2;
    StreamExit     exit             = 3;
    PfReady        pf_ready         = 4;
    PfData         pf_data          = 5;
    PfClose        pf_close         = 6;
    PfConnError    pf_conn_error    = 7;
    PfSessionError pf_session_error = 8;
  }
}
message StreamRegister { string agent_id = 1; }
message StreamOutput   { string session_id = 1; OutputType type = 2; bytes data = 3; }
message StreamExit     { string session_id = 1; int32 exit_code = 2; string error_message = 3; }

message PortForwardStart { string session_id = 1; string pod = 2; string namespace = 3; repeated uint32 ports = 4; }
message PfOpen           { string session_id = 1; uint32 conn_id = 2; uint32 remote_port = 3; }
message PfData           { string session_id = 1; uint32 conn_id = 2; bytes  data = 3; }
message PfClose          { string session_id = 1; uint32 conn_id = 2; }
message PfConnError      { string session_id = 1; uint32 conn_id = 2; string error = 3; }
message PfReady          { string session_id = 1; }
message PfSessionError   { string session_id = 1; string error = 2; }
