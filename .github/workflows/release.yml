name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push images
        run: |
          VER="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for c in central agent cli; do
            docker buildx build --push --platform linux/amd64,linux/arm64 \
              -f "build/${c}.Dockerfile" \
              --build-arg "VERSION=${VER}" \
              --build-arg "COMMIT=${COMMIT}" \
              --build-arg "DATE=${BUILD_DATE}" \
              -t "ghcr.io/why-xn/kbridge-${c}:${VER}" \
              -t "ghcr.io/why-xn/kbridge-${c}:latest" \
              .
          done
      - name: Push Helm charts (OCI)
        run: |
          VER="${GITHUB_REF_NAME#v}"
          helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            -p "${{ secrets.GITHUB_TOKEN }}"
          for chart in central agent; do
            helm package "charts/${chart}" --version "${VER}" --app-version "${GITHUB_REF_NAME}"
            helm push "kbridge-${chart}-${VER}.tgz" oci://ghcr.io/why-xn/charts
          done
